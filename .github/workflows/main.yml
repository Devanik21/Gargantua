name: Docs Steward

on:
  schedule:
    - cron: "17 0 * * *"
    - cron: "17 3 * * *"
    - cron: "17 6 * * *"
    - cron: "17 9 * * *"
    - cron: "17 12 * * *"
    - cron: "17 15 * * *"
    - cron: "17 18 * * *"
    - cron: "17 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-steward
  cancel-in-progress: false

jobs:
  maintain-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether this schedule slot is today's run
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "today=$(date +%F)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          export TZ="Asia/Kolkata"
          TODAY="$(date +%F)"
          HOUR_UTC="$(date -u +%H)"
          SLOT=$((10#$HOUR_UTC / 3))

          DIGEST="$(printf '%s' "$TODAY" | sha256sum | cut -c1-2)"
          TARGET=$((16#$DIGEST % 8))

          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

          if [ "$SLOT" -eq "$TARGET" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build docs artifacts
        if: steps.gate.outputs.run == 'true'
        shell: bash
        env:
          TODAY: ${{ steps.gate.outputs.today }}
        run: |
          set -euo pipefail

          mkdir -p docs/generated/history
          mkdir -p docs/.bot

          python3 <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import re
          import subprocess
          from datetime import datetime
          from pathlib import Path

          repo = Path(".").resolve()
          docs = repo / "docs"
          generated = docs / "generated"
          history_dir = generated / "history"
          bot_dir = docs / ".bot"

          today = os.environ.get("TODAY") or datetime.utcnow().strftime("%Y-%m-%d")
          now_utc = datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")

          def read_text(path: Path) -> str:
              return path.read_text(encoding="utf-8", errors="ignore")

          def write_if_changed(path: Path, content: str) -> bool:
              if path.exists() and read_text(path) == content:
                  return False
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content, encoding="utf-8")
              return True

          def sha256_bytes(data: bytes) -> str:
              return hashlib.sha256(data).hexdigest()

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              h.update(path.as_posix().encode("utf-8"))
              h.update(b"\0")
              h.update(path.read_bytes())
              return h.hexdigest()

          def lines_or_default(items, default):
              items = list(items)
              return items if items else [default]

          def find_main_file() -> Path | None:
              candidates = sorted(repo.glob("*.py"))
              for p in candidates:
                  txt = read_text(p)
                  if "st.set_page_config" in txt and "_safe_import(" in txt:
                      return p
              for p in candidates:
                  txt = read_text(p)
                  if "st.set_page_config" in txt:
                      return p
              return candidates[0] if candidates else None

          main_file = find_main_file()
          main_text = read_text(main_file) if main_file else ""

          watch_patterns = [
              "*.py",
              "README*",
              "requirements*.txt",
              "pyproject.toml",
              ".github/workflows/*.yml",
              ".github/workflows/*.yaml",
          ]
          watched = []
          seen = set()
          for pattern in watch_patterns:
              for p in sorted(repo.glob(pattern)):
                  if p.is_file() and p not in seen:
                      seen.add(p)
                      watched.append(p)

          watch_map = {p.relative_to(repo).as_posix(): sha256_file(p) for p in watched}
          root_fingerprint = sha256_bytes(json.dumps(watch_map, sort_keys=True).encode("utf-8"))

          state_path = bot_dir / "state.json"
          prev = {}
          if state_path.exists():
              try:
                  prev = json.loads(read_text(state_path))
              except Exception:
                  prev = {}

          prev_files = prev.get("files", {})
          changed_files = sorted([name for name, digest in watch_map.items() if prev_files.get(name) != digest])
          deleted_files = sorted([name for name in prev_files.keys() if name not in watch_map])

          safe_imports = re.findall(r'_safe_import\("([^"]+)"', main_text)
          backend_pages = re.findall(
              r'\(\s*"([^"]+)"\s*,\s*"([^"]+)"\s*,\s*"([^"]+)"\s*\)',
              main_text,
          )

          constants = {}
          for key in [
              "MISSION_START_YEAR",
              "CURRENT_MISSION_DAY",
              "WORMHOLE_STATUS",
              "PLAN_A_PCT",
              "PLAN_B_EMBRYOS",
              "TARS_HONESTY",
              "TARS_HUMOUR",
              "BLIGHT_SEVERITY",
          ]:
              m = re.search(rf'^{key}\s*=\s*(.+)$', main_text, re.MULTILINE)
              if m:
                  constants[key] = m.group(1).strip()

          readme = None
          for p in sorted(repo.glob("README*")):
              if p.is_file():
                  readme = p
                  break
          readme_text = read_text(readme) if readme else ""

          module_lines = []
          for line in readme_text.splitlines():
              if "← Module" in line or "← Mission Control Frontend" in line:
                  module_lines.append(line.strip())

          feature_checks = [
              ("Streamlit mission-control frontend", "st.set_page_config" in main_text),
              ("Safe backend import layer", "_safe_import(" in main_text),
              ("Boot sequence", "render_boot_sequence" in main_text),
              ("Mission overview dashboard", "render_overview" in main_text),
              ("System status diagnostics", "render_system_status" in main_text or "SYSTEM STATUS" in main_text),
              ("Global matplotlib theming", "apply_global_mpl_style" in main_text),
              ("Welcome banner", "render_welcome_banner" in main_text),
              ("TARS dialogue layer", "tars_dialogue" in main_text or "TARS" in main_text),
              ("Background image handling", "load_background" in main_text and "inject_background" in main_text),
              ("Navigation router", "page ==" in main_text or "Main router" in main_text),
          ]
          detected_features = [label for label, ok in feature_checks if ok]

          def git_diff_names() -> list[str]:
              try:
                  out = subprocess.check_output(
                      ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
                  return [x.strip() for x in out.splitlines() if x.strip()]
              except Exception:
                  return []

          recent_diff = git_diff_names()

          def list_block(title: str, items: list[str], default: str) -> list[str]:
              return [title, "", *lines_or_default(items, default), ""]

          feature_map_content = "\n".join([
              "# Feature map",
              "",
              f"Generated: {now_utc}",
              "",
              "## Detected architecture",
              *[f"- {x}" for x in detected_features] if detected_features else ["- No features detected."],
              "",
              "## Main frontend",
              f"- `{main_file.name}`" if main_file else "- Not found.",
              "",
              "## Safe imports detected in the frontend",
              *[f"- `{x}`" for x in sorted(set(safe_imports))] if safe_imports else ["- None detected."],
              "",
              "## Navigation pages detected in the frontend",
              *[f"- `{label}` ({key}) {icon}" for icon, label, key in backend_pages] if backend_pages else ["- None detected."],
              "",
              "## Important constants from the frontend",
              *[f"- `{k}` = `{v}`" for k, v in sorted(constants.items())] if constants else ["- None detected."],
              "",
              "## README module list",
              *[f"- {line}" for line in module_lines] if module_lines else ["- README module layout not parsed."],
              "",
          ]) + "\n"

          system_status_content = "\n".join([
              "# System status",
              "",
              f"Generated: {now_utc}",
              "",
              "## Repository health",
              f"- Tracked source files: {len(watch_map)}",
              f"- Changed source files since last snapshot: {len(changed_files)}",
              f"- Deleted source files since last snapshot: {len(deleted_files)}",
              "",
              "## Source file changes",
              *[f"- Changed: `{x}`" for x in changed_files] if changed_files else ["- No source file changes detected."],
              *[f"- Deleted: `{x}`" for x in deleted_files] if deleted_files else [],
              "",
              "## README / frontend alignment",
              "- The frontend uses safe imports and fallback UI for missing modules.",
              "- The README describes a multi-module science platform with a Streamlit command centre.",
              "- This workflow keeps its writes inside `docs/` only.",
              "",
          ]) + "\n"

          repo_index_content = "\n".join([
              "# Documentation index",
              "",
              f"Generated: {now_utc}",
              "",
              "## Key files",
              "- [Feature map](feature-map.md)",
              "- [System status](system-status.md)",
              "- [Changelog](changelog.md)",
              "- [Roadmap](roadmap.md)",
              "- [Daily history](generated/history/)",
              "",
              "## Latest snapshot",
              f"- {today}",
              "",
          ]) + "\n"

          roadmap_content = "\n".join([
              "# Docs roadmap",
              "",
              "This file is the living note space for the repository.",
              "",
              "## Current focus",
              "- Maintain a clear map of the Interstellar frontend and backend modules.",
              "- Keep repository documentation aligned with the actual codebase.",
              "- Prune generated history older than 7 days.",
              "",
              "## Boundaries",
              "- Only `docs/` is modified.",
              "- No source files are touched.",
              "- Commits happen only when there is a real diff.",
              "",
          ]) + "\n"

          daily_lines = [
              f"# Daily snapshot — {today}",
              "",
              f"Generated: {now_utc}",
              "",
              "## What changed in the codebase",
              *[f"- {x}" for x in changed_files] if changed_files else ["- No source changes detected in the current comparison window."],
              "",
              "## Detected project features",
              *[f"- {x}" for x in detected_features] if detected_features else ["- No project features detected."],
              "",
              "## Visible backend list from the README",
              *[f"- {line}" for line in module_lines] if module_lines else ["- README module layout not found."],
              "",
              "## Notes",
              "- This entry is generated from the real repository state.",
              "- It is kept under `docs/generated/history/`.",
              "- Older daily entries are removed after 7 days.",
              "",
          ]
          daily_content = "\n".join(daily_lines).replace("\n\n\n", "\n\n") + "\n"

          changelog_path = docs / "changelog.md"
          changelog_header = [
              "# Changelog",
              "",
              "This file is updated only when source content changes.",
              "",
          ]
          existing_changelog = read_text(changelog_path) if changelog_path.exists() else "\n".join(changelog_header)

          changelog_entries = []
          if changed_files or deleted_files:
              changelog_entries.extend([
                  f"## {today}",
                  "",
                  *[f"- Changed: `{x}`" for x in changed_files] if changed_files else ["- No changed files listed."],
                  *[f"- Deleted: `{x}`" for x in deleted_files] if deleted_files else [],
                  "",
              ])

          if existing_changelog.strip().startswith("# Changelog"):
              new_changelog = existing_changelog.rstrip()
              if changelog_entries:
                  new_changelog += "\n\n" + "\n".join(changelog_entries).rstrip()
              new_changelog += "\n"
          else:
              new_changelog = "\n".join(changelog_header + changelog_entries) + "\n"

          write_if_changed(docs / "feature-map.md", feature_map_content)
          write_if_changed(docs / "system-status.md", system_status_content)
          write_if_changed(docs / "index.md", repo_index_content)
          write_if_changed(docs / "roadmap.md", roadmap_content)
          write_if_changed(history_dir / f"{today}.md", daily_content)
          write_if_changed(changelog_path, new_changelog)

          state = {
              "root_fingerprint": root_fingerprint,
              "files": watch_map,
              "last_run_utc": now_utc,
              "last_today": today,
          }
          write_if_changed(state_path, json.dumps(state, indent=2, sort_keys=True) + "\n")
          write_if_changed(bot_dir / "last_run.txt", now_utc + "\n")
          PY

      - name: Prune generated history older than 7 days
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          find docs/generated/history -type f -mtime +7 -print -delete 2>/dev/null || true
          find docs/generated/history -type d -empty -delete 2>/dev/null || true

      - name: Commit docs changes once
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- docs; then
            echo "No docs changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs
          git commit -m "docs: refresh Interstellar documentation"
          git push origin "HEAD:${GITHUB_REF_NAME}"
