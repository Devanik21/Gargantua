          # ── docs/roadmap.md  (static — written once)
          def build_roadmap() -> str:
              return textwrap.dedent(f"""\
          # INTERSTELLAR · Documentation Bot — Roadmap & Rules

          > Static intent declaration. Written once; updated only on force-refresh.
          > Bot initialised: `{FIRST_RUN}`

          ---

          ## Purpose

          The `interstellar_docs.yml` GitHub Actions workflow is a self-maintaining
          documentation bot for the **INTERSTELLAR — Gargantua Science Platform**.

          It reads all `.py` files in the repository root and `README.md` on every
          run, produces genuinely useful documentation in `docs/`, and commits only
          real content — never noise.

          ---

          ## Schedule

          Three cron slots fire every calendar day (UTC):

          | Slot | Time (UTC) | Time (IST) | Label |
          |------|-----------|------------|-------|
          | A | 05:17 | 10:47 | morning |
          | B | 13:29 | 18:59 | afternoon |
          | C | 21:43 | 03:13 +1 | night |

          All three always run. This guarantees **2–3 commits per day** regardless
          of whether source files changed, which prevents GitHub's 60-day inactivity
          auto-pause from ever triggering.

          A manual `workflow_dispatch` trigger (with optional `force_refresh`) is
          also available for spot-checks and forced resyncs.

          ---

          ## Files Managed

          | File | Condition |
          |------|-----------|
          | `docs/mission-log.md` | **Always written** (timestamp ensures real diff) |
          | `docs/feature-map.md` | Written when source changes |
          | `docs/system-status.md` | Written when source changes |
          | `docs/code-intelligence.md` | Written when source changes |
          | `docs/index.md` | Written when source changes |
          | `docs/roadmap.md` | Written on first run only |
          | `docs/changelog.md` | Written when `.py` or `README.md` changes |
          | `docs/generated/history/*.md` | **Always written** (one file per slot) |

          ---

          ## Hard Rules

          1. **Source is read-only.** No `.py` file or `README.md` is ever written.
          2. **docs/ is the only playground.** Nothing outside `docs/` is staged.
          3. **No fake content.** Every field in every doc reflects real repo state.
          4. **Future-proof.** New `.py` files added to root are auto-discovered.
          5. **Self-cleaning.** History files older than 7 days are auto-deleted.
          6. **Idempotent.** Running twice in the same slot is safe.
          7. **Zero pip deps.** Pure Python stdlib — no install step ever fails.

          ---

          ## What It Does NOT Do

          - Generate AI-written summaries or fictional content
          - Modify, rename, or delete any source file
          - Write outside `docs/`
          - Inflate the graph with empty commits
          - Depend on any external API or secret

          ---

          *"Do not go gentle into that good night." — Dylan Thomas (and TARS)*
          """)

          # ── docs/changelog.md
          CHANGELOG = DOCS / "changelog.md"

          def update_changelog():
              relevant = [f for f in (changed + added + deleted)
                          if f.endswith(".py") or f == "README.md"]
              if not relevant:
                  return False

              if CHANGELOG.exists():
                  body = CHANGELOG.read_text()
              else:
                  body = textwrap.dedent("""\
          # INTERSTELLAR · Changelog

          > Real diff log — updated only when `.py` or `README.md` changes.
          > Maintained by `interstellar_docs.yml`.

          ---

          """)
              if DATE_STR in body:
                  return False

              lines = [f"## {DATE_STR}\n"]
              for f in sorted(set(changed) & set(relevant)):
                  lines.append(f"- Modified: `{f}`")
              for f in sorted(set(added) & set(relevant)):
                  lines.append(f"- Added: `{f}`")
              for f in sorted(set(deleted) & set(relevant)):
                  lines.append(f"- Deleted: `{f}`")
              lines.append(f"- Slot: {SLOT} ({SLOT_LABEL}) | Run #{TOTAL_RUNS}")
              lines.append("")

              marker = "---\n\n"
              if marker in body:
                  idx  = body.index(marker) + len(marker)
                  body = body[:idx] + "\n".join(lines) + "\n" + body[idx:]
              else:
                  body = body + "\n".join(lines) + "\n"

              CHANGELOG.write_text(body)
              print(f"[BOT] Changelog updated with {len(lines)-1} entries")
              return True

          # ── docs/generated/history/YYYY-MM-DD-<slot>.md  [ALWAYS written]
          def write_history():
              nav_list = "\n".join(
                  f"  - {icon} **{label}** (`{key}`)"
                  for icon, label, key in ALL_NAV) or "  - (none detected)"

              safe_list = "\n".join(
                  f"  - `{m}`" for m in ALL_SAFE) or "  - (none detected)"

              file_table = ""
              for name in sorted(py_here):
                  p = parsed[name]
                  file_table += (f"| `{name}` | {p['lines']:,} | "
                                 f"{len(p.get('defs',[]))} | `{p['hash']}` |\n")

              const = ALL_CONST
              KEY_CONSTS = [
                  "PLAN_A_PCT","PLAN_B_EMBRYOS","TARS_HONESTY","TARS_HUMOUR",
                  "BLIGHT_SEVERITY","WORMHOLE_STATUS",
              ]
              const_block = "\n".join(
                  f"  {k} = {const.get(k,'N/A')}" for k in KEY_CONSTS)

              delta = "No source changes." if not repo_changed else (
                  ("Modified: " + ", ".join(changed) + "\n" if changed else "") +
                  ("Added: "    + ", ".join(added)   + "\n" if added   else "") +
                  ("Deleted: "  + ", ".join(deleted)  + "\n" if deleted else "")
              ).strip()

              content = textwrap.dedent(f"""\
          # INTERSTELLAR · Snapshot — {DATE_STR} · Slot {SLOT}

          > Run #{TOTAL_RUNS} | {NOW_UTC} | SHA `{SHA_SHORT}` | Trigger: {'manual' if IS_MANUAL else 'scheduled'}

          ---

          ## Source Delta

          {delta}

          ---

          ## System Health

          | Metric | Value |
          |--------|-------|
          | .py files | {len(py_here)} |
          | Total lines | {TOTAL_LINES:,} |
          | Backends | {len(ALL_SAFE)} |
          | Nav pages | {len(ALL_NAV)} |
          | Bot uptime | {UPTIME_DAYS} days |
          | All-time runs | {TOTAL_RUNS} |
          | Git commits | {TOTAL_COMMITS_GIT} |

          ---

          ## File Registry

          | File | Lines | Functions | Hash |
          |------|------:|----------:|------|
          {file_table.rstrip()}

          ---

          ## Navigation Pages

          {nav_list}

          ---

          ## Backend Modules

          {safe_list}

          ---

          ## Mission Constants

          ```
          {const_block}
          ```

          ---

          *Slot {SLOT} ({SLOT_LABEL}) · {NOW_UTC}*
          """)

              # One file per slot per day: YYYY-MM-DD-A.md, -B.md, -C.md
              hist_file = HIST / f"{DATE_STR}-{SLOT}.md"
              hist_file.write_text(content)
              print(f"[BOT] History snapshot → {hist_file}")

          # ── Cleanup: delete history files older than 7 days ──────────────────
          def purge_old_history():
              cutoff = TODAY - timedelta(days=7)
              purged = []
              for f in HIST.glob("*.md"):
                  # filename format: YYYY-MM-DD[-X].md
                  stem = f.stem[:10]          # first 10 chars = date
                  try:
                      if date.fromisoformat(stem) < cutoff:
                          f.unlink()
                          purged.append(f.name)
                  except ValueError:
                      pass
              if purged:
                  print(f"[BOT] Purged {len(purged)} old history files: {purged}")

          # ════════════════════════════════════════════════════════════════════
          # ORCHESTRATE
          # ════════════════════════════════════════════════════════════════════
          purge_old_history()

          def write_if_changed(path: Path, content: str, label: str) -> bool:
              if FORCE or not path.exists() or path.read_text() != content:
                  path.write_text(content)
                  print(f"[BOT] Written: {path.name} ({label})")
                  return True
              print(f"[BOT] Unchanged: {path.name} ({label})")
              return False

          # Always written — these guarantee the daily commit
          mission_log = build_mission_log()      # build AFTER updating run_history
          (DOCS / "mission-log.md").write_text(mission_log)
          print("[BOT] Written: mission-log.md (guaranteed — timestamp always differs)")
          write_history()

          # Written only on real diffs
          write_if_changed(DOCS / "feature-map.md",        build_feature_map(),        "feature map")
          write_if_changed(DOCS / "system-status.md",      build_system_status(),      "system status")
          write_if_changed(DOCS / "code-intelligence.md",  build_code_intelligence(),  "code intelligence")
          write_if_changed(DOCS / "index.md",              build_index(),              "index")

          roadmap_p = DOCS / "roadmap.md"
          if FORCE or not roadmap_p.exists():
              roadmap_p.write_text(build_roadmap())
              print("[BOT] Written: roadmap.md (static)")

          update_changelog()

          # ── Persist state ─────────────────────────────────────────────────────
          state["hashes"]        = curr_h
          state["last_run"]      = NOW_UTC
          state["total_commits"] = TOTAL_COMMITS + 1   # optimistic — bash step confirms
          save_state(state)

          # ── Commit message ────────────────────────────────────────────────────
          delta_str = ", ".join(
              (["modified:" + ",".join(changed)] if changed else []) +
              (["added:"    + ",".join(added)]   if added   else []) +
              (["deleted:"  + ",".join(deleted)] if deleted else [])
          ) or "no-source-delta"

          commit_msg = textwrap.dedent(f"""\
          docs(interstellar): [{DATE_STR}] slot-{SLOT} run-#{TOTAL_RUNS}

          Slot       : {SLOT} ({SLOT_LABEL})
          Timestamp  : {NOW_UTC}
          SHA        : {SHA_SHORT}
          Uptime     : {UPTIME_DAYS} days (since {FIRST_RUN})
          Runs today : {RUNS_TODAY}
          Source     : {delta_str}
          Trigger    : {'manual' if IS_MANUAL else 'scheduled'}
          Scope      : docs/ only — source never modified
          """)

          BOT.joinpath("commit_msg.txt").write_text(commit_msg)
          print(f"[BOT] ✅ Engine complete.")

      # ── 4. Commit and push ────────────────────────────────────────────────────
      - name: Commit and push docs
        run: |
          git config user.name  "Devanik21"
          git config user.email "devanik2005@gmail.com"

          # Stage ONLY docs/ — source files are never touched
          git add docs/

          # Safety net: if somehow nothing staged, exit cleanly
          if git diff --staged --quiet; then
            echo "[BOT] Nothing staged — unexpected (mission-log should always differ). Exiting."
            exit 0
          fi

          git commit -F .bot/commit_msg.txt
          git push origin HEAD

          echo "[BOT] ✅ Committed and pushed successfully."
