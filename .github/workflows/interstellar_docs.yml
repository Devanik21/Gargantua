name: INTERSTELLAR · Self-Maintaining Docs

# ──────────────────────────────────────────────────────────────────────────────
# Maintains docs/ for the INTERSTELLAR — Gargantua Science Platform.
#
# GUARANTEED: at least 2 genuine commits every calendar day, forever.
#
# ── Three-layer inactivity defence ───────────────────────────────────────────
# Layer 1 — docs/mission-log.md
#   Contains a per-second UTC timestamp + cumulative run counter.
#   Content is different on every single run → always a real diff.
#
# Layer 2 — docs/generated/history/YYYY-MM-DD.md
#   Written unconditionally on every run (last-write-wins per day).
#
# Layer 3 — .github/keepalive/active.md   ← THE IRON LOCK
#   Rewritten every run with the current UTC datetime.
#   Staged alongside docs/ in the commit step.
#   Because this file lives under .github/, GitHub's activity checker
#   ALWAYS counts it as real repository activity, making the 60-day
#   inactivity auto-pause impossible to trigger. Ever.
#
# All three layers produce a genuine diff → 'git commit' never fails.
# No fake content, no padding, no forced empty commits.
#
# ── Schedule (UTC) ───────────────────────────────────────────────────────────
#   Slot A — 06:17 UTC  (morning,  ~11:47 IST)
#   Slot B — 18:43 UTC  (evening,  ~00:13 IST next day)
# Both slots always commit. No window-skipping logic whatsoever.
#
# ── Concurrency ──────────────────────────────────────────────────────────────
# Concurrent runs (e.g. manual + scheduled overlap) are serialised via the
# 'concurrency' key. cancel-in-progress: false → both finish, second push wins.
#
# ── Manual trigger ───────────────────────────────────────────────────────────
# workflow_dispatch with optional force_refresh: 'true' rewrites all docs.
#
# ── Files managed ────────────────────────────────────────────────────────────
#   docs/mission-log.md                   ← live run log, always updated
#   docs/feature-map.md                   ← architecture snapshot
#   docs/system-status.md                 ← health + hashes + change summary
#   docs/index.md                         ← entry-point with all links
#   docs/roadmap.md                       ← static intent declaration
#   docs/changelog.md                     ← real changelog (.py / README diffs)
#   docs/generated/history/YYYY-MM-DD.md  ← 30-day rolling daily snapshots
#   .github/keepalive/active.md           ← inactivity-proof sentinel (always)
#   .bot/state.json                       ← internal state (not committed)
#
# ── What it NEVER does ───────────────────────────────────────────────────────
#   • Touch any .py file or README.md
#   • Write anything outside docs/ or .github/keepalive/
#   • Generate fake / meaningless content
#   • Skip a commit (no early-exit paths)
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Slot A — morning run — ~11:47 IST
    - cron: '17 6 * * *'
    # Slot B — evening run — ~00:13 IST (next day)
    - cron: '43 18 * * *'

  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force-rewrite all docs even if content unchanged'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Prevent two concurrent runs stomping on each other (e.g. manual + scheduled).
# 'cancel-in-progress: false' lets both finish; second push wins cleanly.
concurrency:
  group: interstellar-docs
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  docs-maintenance:
    name: Scan · Write · Commit
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python ─────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Core logic ─────────────────────────────────────────────────────────
      - name: Run INTERSTELLAR docs engine
        env:
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        shell: python3 {0}
        run: |
          # ════════════════════════════════════════════════════════════════════
          # INTERSTELLAR Documentation Engine
          # Pure stdlib — zero pip installs.
          # Reads real repo state; every run produces a genuine commit.
          # ════════════════════════════════════════════════════════════════════
          import os, sys, json, hashlib, re, textwrap
          from datetime import date, datetime, timedelta
          from pathlib import Path

          # ── Runtime constants ─────────────────────────────────────────────
          TODAY         = date.today()
          DATE_STR      = TODAY.strftime("%Y-%m-%d")
          NOW_UTC       = datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
          NOW_UTC_SHORT = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          DOY           = TODAY.timetuple().tm_yday
          FORCE_REFRESH = os.environ.get("FORCE_REFRESH", "false").lower() == "true"
          IS_MANUAL     = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"
          RUN_NUMBER    = int(os.environ.get("GITHUB_RUN_NUMBER", "0"))

          # Slot label — which cron fired?
          _h = datetime.utcnow().hour
          SLOT = "A (morning)" if _h < 12 else "B (evening)"
          if IS_MANUAL:
              SLOT = "manual"

          # ── Paths ─────────────────────────────────────────────────────────
          ROOT      = Path(".")
          DOCS      = ROOT / "docs"
          GENERATED = DOCS / "generated"
          HISTORY   = GENERATED / "history"
          BOT_DIR   = ROOT / ".bot"
          STATE_FILE = BOT_DIR / "state.json"

          for d in [DOCS, GENERATED, HISTORY, BOT_DIR]:
              d.mkdir(parents=True, exist_ok=True)

          # ── Tracked files (read-only — NEVER written to) ──────────────────
          TRACKED_PY = [
              "ENDURANCE.py",
              "gravity_engine.py",
              "relativity_calculator.py",
              "planet_analyzer.py",
              "wormhole_navigator.py",
              "tesseract_decoder.py",
              "crew_telemetry.py",
              "mission_reporter.py",
              "quantum_singularity.py",
          ]
          TRACKED_DOCS = ["README.md"]
          ALL_TRACKED  = TRACKED_PY + TRACKED_DOCS

          # ── State helpers ─────────────────────────────────────────────────
          def load_state():
              if STATE_FILE.exists():
                  try:
                      return json.loads(STATE_FILE.read_text())
                  except Exception:
                      pass
              return {
                  "hashes": {},
                  "last_run": None,
                  "total_runs": 0,
                  "first_run": DATE_STR,
                  "runs_today": 0,
                  "runs_today_date": None,
              }

          def save_state(s):
              STATE_FILE.write_text(json.dumps(s, indent=2))

          def file_hash(path: Path) -> str:
              if not path.exists():
                  return ""
              h = hashlib.sha256()
              h.update(path.read_bytes())
              return h.hexdigest()[:16]

          state       = load_state()
          prev_hashes = state.get("hashes", {})

          # Update run counters
          state["total_runs"] = state.get("total_runs", 0) + 1
          if state.get("runs_today_date") != DATE_STR:
              state["runs_today"]      = 1
              state["runs_today_date"] = DATE_STR
          else:
              state["runs_today"] = state.get("runs_today", 0) + 1
          if not state.get("first_run"):
              state["first_run"] = DATE_STR

          TOTAL_RUNS  = state["total_runs"]
          RUNS_TODAY  = state["runs_today"]
          FIRST_RUN   = state.get("first_run", DATE_STR)

          # Uptime in days since first run
          try:
              first_date  = date.fromisoformat(FIRST_RUN)
              uptime_days = (TODAY - first_date).days
          except Exception:
              uptime_days = 0

          # ── Compute hashes ────────────────────────────────────────────────
          curr_hashes   = {f: file_hash(ROOT / f) for f in ALL_TRACKED}
          changed_files = [f for f in ALL_TRACKED
                           if curr_hashes[f] and curr_hashes[f] != prev_hashes.get(f)]
          deleted_files = [f for f in ALL_TRACKED
                           if prev_hashes.get(f) and not curr_hashes[f]]
          new_files     = [f for f in ALL_TRACKED
                           if curr_hashes[f] and not prev_hashes.get(f)]
          present_files = [f for f in ALL_TRACKED if curr_hashes[f]]
          repo_changed  = bool(changed_files or deleted_files or new_files)

          print(f"[INTERSTELLAR] {DATE_STR} | Slot {SLOT} | Run #{TOTAL_RUNS} "
                f"| Force: {FORCE_REFRESH}")
          print(f"[INTERSTELLAR] Present: {len(present_files)}/{len(ALL_TRACKED)} "
                f"| Changed: {changed_files}")

          # ── Parser: ENDURANCE.py ──────────────────────────────────────────
          def parse_endurance():
              src_path = ROOT / "ENDURANCE.py"
              if not src_path.exists():
                  return {}
              src = src_path.read_text(errors="replace")

              safe_imports = re.findall(r'_safe_import\(\s*"([^"]+)"', src)
              nav_raw      = re.findall(
                  r'\(\s*"([^"]+)"\s*,\s*"([^"]+)"\s*,\s*"([^"]+)"\s*\)', src)

              constants = {}
              for pat, key in [
                  (r'PLAN_A_PCT\s*=\s*([\d.]+)',        'PLAN_A_PCT'),
                  (r'PLAN_B_EMBRYOS\s*=\s*([\d_]+)',    'PLAN_B_EMBRYOS'),
                  (r'TARS_HONESTY\s*=\s*([\d]+)',       'TARS_HONESTY'),
                  (r'TARS_HUMOUR\s*=\s*([\d]+)',        'TARS_HUMOUR'),
                  (r'MISSION_START_YEAR\s*=\s*([\d]+)', 'MISSION_START_YEAR'),
                  (r'CURRENT_MISSION_DAY\s*=\s*([\d]+)','CURRENT_MISSION_DAY'),
                  (r'BLIGHT_SEVERITY\s*=\s*"([^"]+)"',  'BLIGHT_SEVERITY'),
                  (r'WORMHOLE_STATUS\s*=\s*"([^"]+)"',  'WORMHOLE_STATUS'),
                  (r'EARTH_POPULATION\s*=\s*"([^"]+)"', 'EARTH_POPULATION'),
                  (r'GARGANTUA_DIST_LY\s*=\s*"([^"]+)"','GARGANTUA_DIST_LY'),
              ]:
                  m = re.search(pat, src)
                  if m:
                      constants[key] = m.group(1).replace('_', '')

              sections       = re.findall(r'#\s*§(\d+)\s+(.*)', src)
              page_title_m   = re.search(r'page_title\s*=\s*"([^"]+)"', src)
              page_icon_m    = re.search(r'page_icon\s*=\s*"([^"]+)"',  src)
              direct_imports = re.findall(r'^import\s+(\w+)', src, re.MULTILINE)
              from_imports   = re.findall(r'^from\s+(\w+)',   src, re.MULTILINE)

              return {
                  "safe_imports":   list(dict.fromkeys(safe_imports)),
                  "nav_pages":      nav_raw,
                  "constants":      constants,
                  "sections":       sections,
                  "page_title":     page_title_m.group(1) if page_title_m else "INTERSTELLAR",
                  "page_icon":      page_icon_m.group(1)  if page_icon_m  else "♾️",
                  "direct_imports": list(dict.fromkeys(direct_imports + from_imports)),
              }

          # ── Parser: README.md ─────────────────────────────────────────────
          def parse_readme():
              r_path = ROOT / "README.md"
              if not r_path.exists():
                  return {}
              src     = r_path.read_text(errors="replace")
              modules = re.findall(
                  r'[├└]──\s+([\w.]+\.py)\s+←\s+(.+?)(?:\s+\(~[\d,]+ lines\))?$',
                  src, re.MULTILINE)
              total_m    = re.search(r'(\d[\d,]+)\s+lines', src)
              author_m   = re.search(r'\*\*Author:\*\*\s*(.+)', src)
              repo_m     = re.search(r'\*\*Repository:\*\*\s*(.+)', src)
              return {
                  "modules":     modules,
                  "total_lines": total_m.group(1) if total_m else "21,573",
                  "author":      author_m.group(1).strip() if author_m else "Devanik",
                  "repo_header": repo_m.group(1).strip()  if repo_m   else "",
              }

          fe = parse_endurance()
          rm = parse_readme()

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # DOCUMENT BUILDERS
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          # ── NEW: docs/mission-log.md ──────────────────────────────────────
          # This file ALWAYS changes because it contains NOW_UTC (per-second),
          # RUN_NUMBER, TOTAL_RUNS, and RUNS_TODAY.
          # It is the guaranteed-commit anchor for the entire workflow.
          # Content is genuinely useful: a persistent ops log of the docs system.
          def build_mission_log():
              const      = fe.get("constants", {})
              health_sym = "✅" if not deleted_files and len(present_files) == len(ALL_TRACKED) else "⚠️"
              health_txt = "NOMINAL" if health_sym == "✅" else "DEGRADED"

              change_line = "No source changes detected." if not repo_changed else (
                  "Modified: " + ", ".join(f"`{f}`" for f in changed_files)
                  + ("  |  New: " + ", ".join(f"`{f}`" for f in new_files) if new_files else "")
                  + ("  |  Deleted: " + ", ".join(f"`{f}`" for f in deleted_files) if deleted_files else "")
              )

              # Build run history table (last 10 entries from state)
              run_log = state.get("run_log", [])
              run_log.append({
                  "ts":    NOW_UTC,
                  "slot":  SLOT,
                  "run":   TOTAL_RUNS,
                  "delta": change_line[:80],
              })
              run_log = run_log[-10:]   # keep last 10
              state["run_log"] = run_log

              log_rows = ""
              for entry in reversed(run_log):
                  log_rows += (f"| {entry['ts']} | Slot {entry['slot']} | "
                               f"#{entry['run']} | {entry['delta']} |\n")

              return textwrap.dedent(f"""\
          # INTERSTELLAR · Mission Log

          > Live operations log for the self-maintaining docs system.
          > Updated automatically twice daily — every entry is a real run.
          > **Last update: {NOW_UTC}**

          ---

          ## Current Run

          | Field | Value |
          |-------|-------|
          | Timestamp (UTC) | `{NOW_UTC}` |
          | Cron Slot | {SLOT} |
          | Workflow Run # | {RUN_NUMBER} |
          | Total Docs Runs | {TOTAL_RUNS} |
          | Runs Today | {RUNS_TODAY} |
          | Uptime (days since first run) | {uptime_days} |
          | First Run Date | {FIRST_RUN} |
          | Trigger | {'Manual' if IS_MANUAL else 'Scheduled'} |

          ---

          ## System Health

          | Metric | Value |
          |--------|-------|
          | Overall Status | {health_sym} {health_txt} |
          | Tracked Files Present | {len(present_files)} / {len(ALL_TRACKED)} |
          | Backend Modules Detected | {len(fe.get('safe_imports', []))} / 8 |
          | Navigation Pages | {len(fe.get('nav_pages', []))} |
          | Source Changes This Run | {change_line} |

          ---

          ## Mission Constants (live)

          | Constant | Value |
          |----------|-------|
          | `PLAN_A_PCT` | {const.get('PLAN_A_PCT', 'N/A')}% |
          | `PLAN_B_EMBRYOS` | {const.get('PLAN_B_EMBRYOS', 'N/A')} embryos |
          | `TARS_HONESTY` | {const.get('TARS_HONESTY', 'N/A')}% |
          | `TARS_HUMOUR` | {const.get('TARS_HUMOUR', 'N/A')}% |
          | `MISSION_START_YEAR` | {const.get('MISSION_START_YEAR', 'N/A')} |
          | `CURRENT_MISSION_DAY` | {const.get('CURRENT_MISSION_DAY', 'N/A')} |
          | `BLIGHT_SEVERITY` | {const.get('BLIGHT_SEVERITY', 'N/A')} |
          | `WORMHOLE_STATUS` | {const.get('WORMHOLE_STATUS', 'N/A')} |
          | `EARTH_POPULATION` | {const.get('EARTH_POPULATION', 'N/A')} |
          | `GARGANTUA_DIST_LY` | {const.get('GARGANTUA_DIST_LY', 'N/A')} light-years |

          ---

          ## Run History (last 10 runs)

          | Timestamp (UTC) | Slot | Run # | Source Delta |
          |-----------------|------|-------|--------------|
          {log_rows.rstrip()}

          ---

          *INTERSTELLAR — Gargantua Science Platform*
          *Auto-maintained by `interstellar_docs.yml` · docs/ only · source never modified*
          """)

          # ── docs/feature-map.md ───────────────────────────────────────────
          def build_feature_map():
              nav_rows = ""
              for icon, label, key in fe.get("nav_pages", []):
                  nav_rows += f"| {icon} | {label} | `{key}` |\n"

              module_rows = ""
              for fname, desc in rm.get("modules", []):
                  module_rows += f"| `{fname}` | {desc.strip()} |\n"

              safe_list = "\n".join(
                  f"  - `{m}`" for m in fe.get("safe_imports", []))

              const = fe.get("constants", {})
              section_rows = ""
              for num, desc in fe.get("sections", []):
                  section_rows += f"| §{num} | {desc.strip()} |\n"

              return textwrap.dedent(f"""\
          # INTERSTELLAR · Feature Map

          > Auto-generated · Last updated: {NOW_UTC_SHORT}
          > Source of truth: `ENDURANCE.py` + `README.md` — never edit manually

          ---

          ## Navigation Pages

          | Icon | Page Label | Route Key |
          |------|-----------|-----------|
          {nav_rows.rstrip()}

          ---

          ## Backend Modules (Safe-Imported)

          {safe_list}

          ---

          ## Module Registry

          | File | Description |
          |------|-------------|
          {module_rows.rstrip()}

          ---

          ## Mission Constants

          | Constant | Value |
          |----------|-------|
          | `PLAN_A_PCT` | {const.get('PLAN_A_PCT', 'N/A')}% |
          | `PLAN_B_EMBRYOS` | {const.get('PLAN_B_EMBRYOS', 'N/A')} |
          | `TARS_HONESTY` | {const.get('TARS_HONESTY', 'N/A')}% |
          | `TARS_HUMOUR` | {const.get('TARS_HUMOUR', 'N/A')}% |
          | `MISSION_START_YEAR` | {const.get('MISSION_START_YEAR', 'N/A')} |
          | `CURRENT_MISSION_DAY` | {const.get('CURRENT_MISSION_DAY', 'N/A')} |
          | `BLIGHT_SEVERITY` | {const.get('BLIGHT_SEVERITY', 'N/A')} |
          | `WORMHOLE_STATUS` | {const.get('WORMHOLE_STATUS', 'N/A')} |
          | `EARTH_POPULATION` | {const.get('EARTH_POPULATION', 'N/A')} |

          ---

          ## Frontend Section Map (§ markers in ENDURANCE.py)

          | Section | Description |
          |---------|-------------|
          {section_rows.rstrip()}

          ---

          *Total codebase: {rm.get('total_lines', 'N/A')} lines · 9 Python files · 8 science backends*
          """)

          # ── docs/system-status.md ─────────────────────────────────────────
          def build_system_status():
              py_present  = [f for f in present_files if f.endswith(".py")]
              py_changed  = [f for f in changed_files if f.endswith(".py")]
              doc_changed = [f for f in changed_files if not f.endswith(".py")]

              health = "✅ NOMINAL"
              if deleted_files:
                  health = "⚠️ FILES MISSING"
              elif len(py_present) < len(TRACKED_PY):
                  health = "⚠️ INCOMPLETE"

              hash_rows = ""
              for f in sorted(curr_hashes):
                  if curr_hashes[f]:
                      tag = ""
                      if f in changed_files: tag = " ← **changed**"
                      if f in new_files:     tag = " ← **new**"
                      if f in deleted_files: tag = " ← ~~deleted~~"
                      hash_rows += f"| `{f}` | `{curr_hashes[f]}` |{tag}\n"

              return textwrap.dedent(f"""\
          # INTERSTELLAR · System Status

          > Auto-generated · {NOW_UTC_SHORT}

          ---

          ## Overall Health

          **Status:** {health}
          **Tracked files present:** {len(present_files)} / {len(ALL_TRACKED)}
          **Backend modules detected:** {len(fe.get('safe_imports', []))} / 8
          **Navigation pages:** {len(fe.get('nav_pages', []))}

          ---

          ## Change Summary (vs previous run)

          | Category | Files |
          |----------|-------|
          | Changed | {', '.join(f'`{f}`' for f in changed_files) or '—'} |
          | Deleted | {', '.join(f'`{f}`' for f in deleted_files) or '—'} |
          | New     | {', '.join(f'`{f}`' for f in new_files)     or '—'} |

          **Python files changed:** {len(py_changed)}
          **Docs / README changed:** {len(doc_changed)}

          ---

          ## File Hash Registry

          | File | SHA-256 (16 chars) |
          |------|--------------------|
          {hash_rows.rstrip()}

          ---

          ## Mission Constants Snapshot

          ```
          PLAN_A_PCT        = {fe.get('constants', {}).get('PLAN_A_PCT', 'N/A')}%
          PLAN_B_EMBRYOS    = {fe.get('constants', {}).get('PLAN_B_EMBRYOS', 'N/A')}
          TARS_HONESTY      = {fe.get('constants', {}).get('TARS_HONESTY', 'N/A')}%
          TARS_HUMOUR       = {fe.get('constants', {}).get('TARS_HUMOUR', 'N/A')}%
          BLIGHT_SEVERITY   = {fe.get('constants', {}).get('BLIGHT_SEVERITY', 'N/A')}
          WORMHOLE_STATUS   = {fe.get('constants', {}).get('WORMHOLE_STATUS', 'N/A')}
          ```

          ---

          *Snapshot: {NOW_UTC}*
          """)

          # ── docs/index.md ─────────────────────────────────────────────────
          def build_index():
              return textwrap.dedent(f"""\
          # INTERSTELLAR · Docs Index

          > Entry point for all auto-generated documentation.
          > Last refreshed: {NOW_UTC_SHORT}

          ---

          | Document | Purpose |
          |----------|---------|
          | [Mission Log](mission-log.md) | Live ops log — updated every run, guaranteed daily |
          | [Feature Map](feature-map.md) | Architecture snapshot — pages, modules, constants |
          | [System Status](system-status.md) | Health check, file hashes, change summary |
          | [Changelog](changelog.md) | Real change log (`.py` / README diffs only) |
          | [Roadmap](roadmap.md) | Documentation system intent and rules |
          | [History](generated/history/) | Daily snapshots — 30-day rolling window |
          | [Keepalive Sentinel](../.github/keepalive/active.md) | GitHub 60-day inactivity guard — always updated |

          ---

          *INTERSTELLAR — Gargantua Science Platform*
          *{rm.get('total_lines', '21,573')} lines · 9 Python files · 8 science backends*
          *Auto-maintained by `interstellar_docs.yml` · 2 commits/day · inactivity-proof forever*
          """)

          # ── docs/roadmap.md ───────────────────────────────────────────────
          def build_roadmap():
              return textwrap.dedent(f"""\
          # INTERSTELLAR · Documentation Roadmap

          > Static intent declaration for the self-maintaining docs system.
          > Last confirmed: {NOW_UTC_SHORT}

          ---

          ## What This System Does

          The `interstellar_docs.yml` GitHub Actions workflow maintains a live
          documentation layer for the INTERSTELLAR — Gargantua Science Platform.

          It runs twice daily on a fixed UTC schedule:
          - **Slot A** — 06:17 UTC (~11:47 IST) — morning run
          - **Slot B** — 18:43 UTC (~00:13 IST) — evening run

          Both slots always commit. The `docs/mission-log.md` file contains a
          per-second UTC timestamp and cumulative run counter, guaranteeing a real
          diff on every execution. This keeps the repository active forever and
          prevents GitHub's 60-day inactivity auto-pause.

          ---

          ## Hard Rules

          - **Read-only** access to all `.py` files and `README.md`
          - **Write access** only inside `docs/` and `.github/keepalive/` — source never touched
          - **No fake content** — every file contains real extracted data
          - **Changelog** updated only on actual `.py` / README file changes
          - **30-day history TTL** — rolling window of daily snapshots, auto-purged
          - **Idempotent** — running a third time on the same day is safe
          - **Concurrency-safe** — concurrent runs are serialised; no race conditions

          ---

          ## Files Managed

          | File | Update Condition |
          |------|-----------------|
          | `docs/mission-log.md` | **Every run** (per-second timestamp) |
          | `docs/feature-map.md` | Any tracked file changes |
          | `docs/system-status.md` | Any tracked file changes |
          | `docs/index.md` | First run or structural change |
          | `docs/roadmap.md` | First run only (static) |
          | `docs/changelog.md` | `.py` or `README.md` changes only |
          | `docs/generated/history/YYYY-MM-DD.md` | **Every run** (30-day rolling window) |
          | `.github/keepalive/active.md` | **Every run** (inactivity-proof sentinel) |

          ---

          ## What It Does NOT Do

          - Generate AI content or invented summaries
          - Modify `.py` files or `README.md`
          - Write anything outside `docs/` or `.github/keepalive/`
          - Create meaningless / padded commits
          - Skip a commit (no early-exit; mission-log + sentinel always differ)

          ---

          *"Mankind was born on Earth. It was never meant to die here." — Cooper, 2067*
          """)

          # ── docs/changelog.md ────────────────────────────────────────────
          CHANGELOG_PATH = DOCS / "changelog.md"

          def update_changelog():
              relevant = [f for f in (changed_files + new_files + deleted_files)
                          if f.endswith(".py") or f == "README.md"]
              if not relevant:
                  return False

              if CHANGELOG_PATH.exists():
                  existing = CHANGELOG_PATH.read_text()
              else:
                  existing = textwrap.dedent("""\
          # INTERSTELLAR · Changelog

          Auto-generated. Updated only when `.py` files or `README.md` change.

          ---

          """)

              if DATE_STR in existing:
                  return False

              entry_lines = [f"## {DATE_STR}\n"]
              for f in sorted(set(changed_files) & set(relevant)):
                  entry_lines.append(f"- Changed: `{f}`")
              for f in sorted(set(new_files) & set(relevant)):
                  entry_lines.append(f"- New file: `{f}`")
              for f in sorted(set(deleted_files) & set(relevant)):
                  entry_lines.append(f"- Deleted: `{f}`")
              entry_lines.append("")

              insert_marker = "---\n\n"
              if insert_marker in existing:
                  idx         = existing.index(insert_marker) + len(insert_marker)
                  new_content = existing[:idx] + "\n".join(entry_lines) + "\n" + existing[idx:]
              else:
                  new_content = existing + "\n".join(entry_lines) + "\n"

              CHANGELOG_PATH.write_text(new_content)
              return True

          # ── docs/generated/history/YYYY-MM-DD.md (unconditional) ─────────
          def write_history():
              nav_list = "\n".join(
                  f"  - {icon} **{label}** (`{key}`)"
                  for icon, label, key in fe.get("nav_pages", []))
              module_list = "\n".join(
                  f"  - `{fname}` — {desc.strip()}"
                  for fname, desc in rm.get("modules", []))
              safe_list = "\n".join(
                  f"  - `{m}`" for m in fe.get("safe_imports", []))

              const = fe.get("constants", {})

              if repo_changed:
                  change_section  = "## Source Changes\n\n"
                  if changed_files:
                      change_section += "**Modified:** " + ", ".join(f"`{f}`" for f in changed_files) + "\n\n"
                  if new_files:
                      change_section += "**New:** "      + ", ".join(f"`{f}`" for f in new_files)     + "\n\n"
                  if deleted_files:
                      change_section += "**Deleted:** "  + ", ".join(f"`{f}`" for f in deleted_files) + "\n\n"
              else:
                  change_section = "## Source Changes\n\nNone — routine snapshot.\n\n"

              content = textwrap.dedent(f"""\
          # INTERSTELLAR · Daily Snapshot — {DATE_STR}

          > Slot: {SLOT} · Run #{TOTAL_RUNS} · Generated: {NOW_UTC}

          ---

          {change_section}
          ---

          ## System Health

          | Metric | Value |
          |--------|-------|
          | Files Present | {len(present_files)} / {len(ALL_TRACKED)} |
          | Backends Detected | {len(fe.get('safe_imports', []))} / 8 |
          | Navigation Pages | {len(fe.get('nav_pages', []))} |
          | Uptime (days) | {uptime_days} |

          ---

          ## Navigation Pages

          {nav_list}

          ---

          ## Backend Module Registry

          {module_list}

          ---

          ## Safe-Imported Backends

          {safe_list}

          ---

          ## Mission Constants

          ```
          PLAN_A_PCT        = {const.get('PLAN_A_PCT', 'N/A')}%
          PLAN_B_EMBRYOS    = {const.get('PLAN_B_EMBRYOS', 'N/A')}
          TARS_HONESTY      = {const.get('TARS_HONESTY', 'N/A')}%
          TARS_HUMOUR       = {const.get('TARS_HUMOUR', 'N/A')}%
          BLIGHT_SEVERITY   = {const.get('BLIGHT_SEVERITY', 'N/A')}
          WORMHOLE_STATUS   = {const.get('WORMHOLE_STATUS', 'N/A')}
          ```

          ---

          *INTERSTELLAR — Gargantua Science Platform · {rm.get('total_lines', '21,573')} lines*
          """)

              hist_file = HISTORY / f"{DATE_STR}.md"
              # Each slot writes its own version — last-write-wins for the day
              hist_file.write_text(content)
              print(f"[INTERSTELLAR] History snapshot → {hist_file}")

          # ── Cleanup: purge history > 30 days ─────────────────────────────
          # 30-day rolling window gives a full month of daily snapshots.
          def purge_old_history():
              cutoff = TODAY - timedelta(days=30)
              purged = []
              for f in HISTORY.glob("*.md"):
                  try:
                      if date.fromisoformat(f.stem) < cutoff:
                          f.unlink()
                          purged.append(f.name)
                  except ValueError:
                      pass
              if purged:
                  print(f"[INTERSTELLAR] Purged old history: {purged}")

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # ORCHESTRATE
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          purge_old_history()

          def write_if_changed(path: Path, new_content: str, label: str) -> bool:
              if FORCE_REFRESH or not path.exists() or path.read_text() != new_content:
                  path.write_text(new_content)
                  print(f"[INTERSTELLAR] Written: {path} ({label})")
                  return True
              print(f"[INTERSTELLAR] Unchanged: {path} ({label})")
              return False

          # mission-log.md — ALWAYS written (timestamp changes every run)
          mission_log_content = build_mission_log()
          (DOCS / "mission-log.md").write_text(mission_log_content)
          print(f"[INTERSTELLAR] Written: docs/mission-log.md (guaranteed)")

          # history snapshot — ALWAYS written
          write_history()

          # remaining docs — write only on real diffs
          write_if_changed(DOCS / "feature-map.md",   build_feature_map(),   "feature map")
          write_if_changed(DOCS / "system-status.md", build_system_status(), "system status")
          write_if_changed(DOCS / "index.md",         build_index(),         "index")

          roadmap_path = DOCS / "roadmap.md"
          if FORCE_REFRESH or not roadmap_path.exists():
              roadmap_path.write_text(build_roadmap())
              print(f"[INTERSTELLAR] Written: {roadmap_path} (roadmap)")

          update_changelog()

          # ── Save state ────────────────────────────────────────────────────
          state["hashes"]   = curr_hashes
          state["last_run"] = NOW_UTC
          save_state(state)

          # ── Build commit message ──────────────────────────────────────────
          summary_parts = []
          if changed_files: summary_parts.append("changed=" + ",".join(changed_files))
          if new_files:     summary_parts.append("new="     + ",".join(new_files))
          if deleted_files: summary_parts.append("deleted=" + ",".join(deleted_files))
          summary = ("; ".join(summary_parts)) if summary_parts else "no-source-changes"

          commit_msg = (
              f"docs(interstellar): [{DATE_STR}] slot-{SLOT} run-#{TOTAL_RUNS}\n\n"
              f"Source delta : {summary}\n"
              f"Uptime       : {uptime_days} days\n"
              f"Runs today   : {RUNS_TODAY}\n"
              f"Timestamp    : {NOW_UTC}\n"
              f"Trigger      : {'manual' if IS_MANUAL else 'scheduled'}\n"
              f"Scope        : docs/ only — source never modified"
          )

          BOT_DIR.joinpath("commit_msg.txt").write_text(commit_msg)
          print(f"[INTERSTELLAR] Commit message ready.")
          print(f"[INTERSTELLAR] ✅ Engine complete — proceeding to commit.")

      # ── 4. Keepalive sentinel (GitHub 60-day inactivity guard) ───────────────
      # GitHub pauses scheduled workflows if the repo has no pushes for 60 days.
      # Bot commits to docs/ are sometimes not counted by GitHub's activity checker.
      # Writing a sentinel file under .github/ with today's date guarantees the
      # repo is always visibly active, forever — with zero fake content.
      - name: Write keepalive sentinel
        run: |
          mkdir -p .github/keepalive
          DATE_STR=$(date -u '+%Y-%m-%d')
          NOW_UTC=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          SENTINEL=".github/keepalive/active.md"

          cat > "$SENTINEL" << EOF
          # INTERSTELLAR · Keepalive Sentinel

          This file is rewritten on every docs run to guarantee the repository
          is never flagged as inactive by GitHub's 60-day scheduler-pause policy.

          **Last updated:** ${NOW_UTC}
          **Date:** ${DATE_STR}

          > *"Do not go gentle into that good night."*
          > *INTERSTELLAR — Gargantua Science Platform — docs auto-maintained forever.*
          EOF

          echo "[INTERSTELLAR] Sentinel written: ${SENTINEL}"

      # ── 5. Commit and push ────────────────────────────────────────────────────
      - name: Commit and push docs
        run: |
          git config user.name  "INTERSTELLAR-DocsBot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage docs/ AND the keepalive sentinel — both are always real diffs.
          # docs/mission-log.md has a per-second timestamp → always changed.
          # .github/keepalive/active.md has today's UTC time → always changed.
          # Together these form an ironclad guarantee: at least one staged file
          # will always have a real diff, so 'git commit' never fails.
          git add docs/
          git add .github/keepalive/

          # Diagnostic: show exactly what is staged
          echo "[INTERSTELLAR] Staged files:"
          git diff --staged --name-only

          # Commit unconditionally — the two always-changing files ensure this
          # path is always reached with a real diff. No early-exit needed.
          git commit -F .bot/commit_msg.txt
          git push origin HEAD

          echo "[INTERSTELLAR] ✅ Committed and pushed."
