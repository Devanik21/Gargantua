name: INTERSTELLAR · Self-Maintaining Docs

# ══════════════════════════════════════════════════════════════════════════════
# INTERSTELLAR — Gargantua Science Platform  ·  Documentation Bot
# ══════════════════════════════════════════════════════════════════════════════
#
# GUARANTEE: 2–3 genuine, content-rich commits every calendar day, forever.
# GitHub auto-pauses scheduled workflows after 60 days of repo inactivity.
# This bot's own commits count as activity → it keeps itself alive indefinitely.
#
# HOW THE DAILY GUARANTEE WORKS
# ─────────────────────────────
#  • docs/mission-log.md         always rewritten (live UTC timestamp + run stats)
#  • docs/generated/history/     always rewritten (full dated snapshot per slot)
#  Both files carry real, meaningful content that differs every run.
#  Neither is padding — they are the primary audit trail of the project.
#
# SCHEDULE  (3 slots per day, all always run)
# ────────────────────────────────────────────
#  Slot A — 05:17 UTC  (~10:47 IST)   morning
#  Slot B — 13:29 UTC  (~18:59 IST)   afternoon
#  Slot C — 21:43 UTC  (~03:13 IST+1) night
#
# MANUAL TRIGGER
#  workflow_dispatch with optional force_refresh = true
#
# WHAT IT READS  (source files — never written to)
# ─────────────────────────────────────────────────
#  • EVERY .py file found in the repository root  (auto-discovered, future-proof)
#  • README.md
#
# WHAT IT WRITES  (docs/ ONLY — source is never touched)
# ───────────────────────────────────────────────────────
#  docs/mission-log.md                  ← live run log   [ALWAYS updated]
#  docs/feature-map.md                  ← architecture snapshot
#  docs/system-status.md                ← health · hashes · metrics
#  docs/code-intelligence.md            ← deep per-file analysis of all .py
#  docs/index.md                        ← navigation hub
#  docs/roadmap.md                      ← bot intent declaration (static)
#  docs/changelog.md                    ← real diff log (.py / README only)
#  docs/generated/history/YYYY-MM-DD-<slot>.md   [ALWAYS written per slot]
#
# MAINTENANCE
#  • History files older than 7 days are auto-deleted
#  • .bot/state.json stores SHA-256 hashes between runs (never committed)
#
# WHAT IT NEVER DOES
#  ✗ Touch any .py file or README.md
#  ✗ Write outside docs/
#  ✗ Commit empty / fake content
#  ✗ Break even if new .py files are added, or existing ones are deleted
# ══════════════════════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '17  5 * * *'   # Slot A — morning   (~10:47 IST)
    - cron: '29 13 * * *'   # Slot B — afternoon  (~18:59 IST)
    - cron: '43 21 * * *'   # Slot C — night      (~03:13 IST +1)

  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force-rewrite all docs even if content is unchanged'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  docs-bot:
    name: Scan · Analyse · Write · Commit
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history — used for git log metrics

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Engine ────────────────────────────────────────────────────────────
      - name: Run INTERSTELLAR docs engine
        env:
          FORCE_REFRESH:     ${{ github.event.inputs.force_refresh || 'false' }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_ACTOR:      ${{ github.actor }}
          GITHUB_REF_NAME:   ${{ github.ref_name }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: python3 {0}
        run: |
          # ════════════════════════════════════════════════════════════════════
          # INTERSTELLAR Documentation Engine  ·  Pure stdlib · zero pip deps
          # ════════════════════════════════════════════════════════════════════
          import os, sys, json, hashlib, re, textwrap, subprocess
          from datetime import date, datetime, timedelta
          from pathlib import Path

          # ── Runtime ──────────────────────────────────────────────────────────
          TODAY         = date.today()
          NOW           = datetime.utcnow()
          DATE_STR      = TODAY.strftime("%Y-%m-%d")
          NOW_UTC       = NOW.strftime("%Y-%m-%d %H:%M:%S UTC")
          NOW_UTC_S     = NOW.strftime("%Y-%m-%d %H:%M UTC")
          DOY           = TODAY.timetuple().tm_yday
          FORCE         = os.environ.get("FORCE_REFRESH", "false").lower() == "true"
          IS_MANUAL     = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"
          RUN_NUMBER    = os.environ.get("GITHUB_RUN_NUMBER", "0")
          ACTOR         = os.environ.get("GITHUB_ACTOR", "github-actions")
          BRANCH        = os.environ.get("GITHUB_REF_NAME", "main")
          SHA_SHORT     = os.environ.get("GITHUB_SHA", "")[:7]
          REPO          = os.environ.get("GITHUB_REPOSITORY", "")

          # Slot label
          _h = NOW.hour
          if   _h < 9:   SLOT = "A"
          elif _h < 17:  SLOT = "B"
          else:          SLOT = "C"
          if IS_MANUAL:  SLOT = "M"

          SLOT_LABELS = {"A": "morning", "B": "afternoon", "C": "night", "M": "manual"}
          SLOT_LABEL  = SLOT_LABELS[SLOT]

          print(f"[BOT] {DATE_STR} | Slot {SLOT} ({SLOT_LABEL}) | Run #{RUN_NUMBER} "
                f"| SHA {SHA_SHORT} | Force={FORCE}")

          # ── Paths ─────────────────────────────────────────────────────────────
          ROOT      = Path(".")
          DOCS      = ROOT / "docs"
          GEN       = DOCS / "generated"
          HIST      = GEN / "history"
          BOT       = ROOT / ".bot"
          STATE_F   = BOT / "state.json"

          for d in [DOCS, GEN, HIST, BOT]:
              d.mkdir(parents=True, exist_ok=True)

          # ── Auto-discover ALL .py files in root ──────────────────────────────
          # This is future-proof: any new .py you add is automatically tracked.
          ROOT_PY = sorted(
              p.name for p in ROOT.glob("*.py")
              if not p.name.startswith("_")
          )
          # Always include README even if it doesn't exist yet
          TRACKED_DOCS = ["README.md"]
          ALL_TRACKED  = ROOT_PY + TRACKED_DOCS

          print(f"[BOT] Discovered {len(ROOT_PY)} .py files in root: {ROOT_PY}")

          # ── State ─────────────────────────────────────────────────────────────
          def load_state() -> dict:
              try:
                  if STATE_F.exists():
                      return json.loads(STATE_F.read_text())
              except Exception:
                  pass
              return {
                  "hashes": {},
                  "total_runs": 0,
                  "first_run": DATE_STR,
                  "last_run": None,
                  "runs_today": 0,
                  "runs_today_date": None,
                  "total_commits": 0,
              }

          def save_state(s: dict):
              STATE_F.write_text(json.dumps(s, indent=2))

          def sha256_short(path: Path) -> str:
              if not path.exists():
                  return ""
              h = hashlib.sha256()
              h.update(path.read_bytes())
              return h.hexdigest()[:16]

          state = load_state()
          state["total_runs"] = state.get("total_runs", 0) + 1
          if state.get("runs_today_date") != DATE_STR:
              state["runs_today"]      = 1
              state["runs_today_date"] = DATE_STR
          else:
              state["runs_today"] = state.get("runs_today", 0) + 1
          state.setdefault("first_run", DATE_STR)
          state.setdefault("total_commits", 0)

          TOTAL_RUNS   = state["total_runs"]
          RUNS_TODAY   = state["runs_today"]
          FIRST_RUN    = state["first_run"]
          TOTAL_COMMITS = state["total_commits"]

          try:
              UPTIME_DAYS = (TODAY - date.fromisoformat(FIRST_RUN)).days
          except Exception:
              UPTIME_DAYS = 0

          # ── Hash diff ─────────────────────────────────────────────────────────
          prev_h   = state.get("hashes", {})
          curr_h   = {f: sha256_short(ROOT / f) for f in ALL_TRACKED}

          changed  = [f for f in ALL_TRACKED if curr_h[f] and curr_h[f] != prev_h.get(f)]
          deleted  = [f for f in ALL_TRACKED if prev_h.get(f) and not curr_h[f]]
          added    = [f for f in ALL_TRACKED if curr_h[f] and not prev_h.get(f)]
          present  = [f for f in ALL_TRACKED if curr_h[f]]
          py_here  = [f for f in ROOT_PY if curr_h.get(f)]

          repo_changed = bool(changed or deleted or added)

          print(f"[BOT] Present: {len(present)}/{len(ALL_TRACKED)} | "
                f"Changed: {changed} | Added: {added} | Deleted: {deleted}")

          # ── Git log helpers ───────────────────────────────────────────────────
          def git(*args, default="") -> str:
              try:
                  return subprocess.check_output(
                      ["git"] + list(args),
                      stderr=subprocess.DEVNULL, text=True
                  ).strip()
              except Exception:
                  return default

          LAST_COMMIT_MSG  = git("log", "-1", "--pretty=%s", default="N/A")
          LAST_COMMIT_DATE = git("log", "-1", "--pretty=%ci", default="N/A")
          TOTAL_COMMITS_GIT = git("rev-list", "--count", "HEAD", default="N/A")
          BRANCH_LIST      = git("branch", "-a", "--format=%(refname:short)", default="")
          CONTRIB_AUTHORS  = git("shortlog", "-sn", "--no-merges",
                                  "--since=30 days ago", default="")

          # ── Parse a .py file ─────────────────────────────────────────────────
          def parse_py(name: str) -> dict:
              """
              Extracts from any .py file (no import, pure text):
                - line count
                - docstring (first triple-quoted block)
                - import list
                - class names
                - function / def names (top-level)
                - st.set_page_config fields
                - string constants (ALL_CAPS = "...")
                - streamlit page tabs / sections
                - safe_import calls
              """
              path = ROOT / name
              if not path.exists():
                  return {"name": name, "exists": False}

              src   = path.read_text(errors="replace")
              lines = src.splitlines()

              # docstring
              doc_m = re.search(r'"""(.*?)"""', src, re.DOTALL)
              docstring = doc_m.group(1).strip()[:300] if doc_m else ""

              # imports
              imports = re.findall(r'^(?:import|from)\s+(\S+)', src, re.MULTILINE)
              imports = list(dict.fromkeys(imports))[:20]

              # classes
              classes = re.findall(r'^class\s+(\w+)', src, re.MULTILINE)

              # top-level defs
              defs = re.findall(r'^def\s+(\w+)', src, re.MULTILINE)

              # streamlit config
              pg_title = re.search(r'page_title\s*=\s*"([^"]+)"', src)
              pg_icon  = re.search(r'page_icon\s*=\s*"([^"]+)"', src)
              layout   = re.search(r'layout\s*=\s*"([^"]+)"', src)

              # ALL_CAPS string constants
              constants = {}
              for m in re.finditer(r'^([A-Z][A-Z0-9_]{2,})\s*=\s*["\']([^"\']{0,60})["\']',
                                   src, re.MULTILINE):
                  constants[m.group(1)] = m.group(2)
              # ALL_CAPS numeric constants
              for m in re.finditer(r'^([A-Z][A-Z0-9_]{2,})\s*=\s*([\d.]+)',
                                   src, re.MULTILINE):
                  if m.group(1) not in constants:
                      constants[m.group(1)] = m.group(2)

              # safe_import backend names
              safe_imports = re.findall(r'_safe_import\(\s*["\']([^"\']+)["\']', src)

              # NAV_PAGES tuples
              nav_pages = re.findall(
                  r'\(\s*"([^"]+)"\s*,\s*"([^"]+)"\s*,\s*"([^"]+)"\s*\)', src)

              # section markers §N
              sections = re.findall(r'#\s*§(\d+)\s+(.*)', src)

              # st.tabs / st.sidebar
              tabs = re.findall(r'st\.tabs\(\s*\[([^\]]+)\]', src)

              return {
                  "name":         name,
                  "exists":       True,
                  "lines":        len(lines),
                  "chars":        len(src),
                  "docstring":    docstring,
                  "imports":      imports,
                  "classes":      classes,
                  "defs":         defs[:30],
                  "page_title":   pg_title.group(1) if pg_title else "",
                  "page_icon":    pg_icon.group(1)  if pg_icon  else "",
                  "layout":       layout.group(1)   if layout   else "",
                  "constants":    constants,
                  "safe_imports": list(dict.fromkeys(safe_imports)),
                  "nav_pages":    nav_pages,
                  "sections":     sections,
                  "tabs":         tabs,
                  "hash":         curr_h.get(name, ""),
              }

          # Parse README separately
          def parse_readme() -> dict:
              path = ROOT / "README.md"
              if not path.exists():
                  return {}
              src = path.read_text(errors="replace")
              modules = re.findall(
                  r'[├└]──\s+([\w.]+\.py)\s+←\s+(.+?)(?:\s+\(~[\d,]+ lines\))?$',
                  src, re.MULTILINE)
              total_m  = re.search(r'(\d[\d,]+)\s+lines', src)
              author_m = re.search(r'\*\*Author:\*\*\s*(.+)', src)
              badges   = re.findall(r'!\[([^\]]+)\]\(([^)]+)\)', src)
              h1_m     = re.search(r'^#\s+(.+)', src, re.MULTILINE)
              return {
                  "modules":     modules,
                  "total_lines": total_m.group(1)   if total_m  else "21,573",
                  "author":      author_m.group(1).strip() if author_m else "Devanik",
                  "badges":      badges[:10],
                  "title":       h1_m.group(1).strip() if h1_m else "INTERSTELLAR",
              }

          # Parse everything
          parsed  = {name: parse_py(name) for name in ROOT_PY}
          readme  = parse_readme()

          # Aggregate across all parsed files
          def agg_safe_imports():
              s = []
              for p in parsed.values():
                  s.extend(p.get("safe_imports", []))
              return list(dict.fromkeys(s))

          def agg_nav_pages():
              for p in parsed.values():
                  if p.get("nav_pages"):
                      return p["nav_pages"]
              return []

          def agg_constants():
              # Merge constants from all files; ENDURANCE.py wins on conflict
              c = {}
              for name, p in parsed.items():
                  if name != "ENDURANCE.py":
                      c.update(p.get("constants", {}))
              if "ENDURANCE.py" in parsed:
                  c.update(parsed["ENDURANCE.py"].get("constants", {}))
              return c

          ALL_SAFE    = agg_safe_imports()
          ALL_NAV     = agg_nav_pages()
          ALL_CONST   = agg_constants()
          TOTAL_LINES = sum(p.get("lines", 0) for p in parsed.values())
          TOTAL_DEFS  = sum(len(p.get("defs", [])) for p in parsed.values())
          TOTAL_CLASSES = sum(len(p.get("classes", [])) for p in parsed.values())

          # ════════════════════════════════════════════════════════════════════
          # DOCUMENT BUILDERS
          # ════════════════════════════════════════════════════════════════════

          # ── docs/mission-log.md  [ALWAYS written — timestamp guarantees diff]
          def build_mission_log() -> str:
              # Run history table — last 10 entries from state
              run_hist = state.get("run_history", [])
              run_hist.append({
                  "ts":   NOW_UTC,
                  "slot": SLOT,
                  "run":  TOTAL_RUNS,
                  "sha":  SHA_SHORT,
                  "chg":  len(changed),
              })
              run_hist = run_hist[-10:]          # keep last 10
              state["run_history"] = run_hist    # persist

              hist_rows = ""
              for e in reversed(run_hist):
                  hist_rows += (f"| `{e['ts']}` | {e['slot']} | #{e['run']} "
                                f"| `{e['sha']}` | {e['chg']} |\n")

              py_size_rows = ""
              for name in sorted(py_here):
                  p = parsed[name]
                  py_size_rows += (f"| `{name}` | {p['lines']:,} | "
                                   f"{p['chars']:,} | `{p['hash']}` |\n")

              const_rows = ""
              KEY_CONSTS = [
                  "PLAN_A_PCT","PLAN_B_EMBRYOS","TARS_HONESTY","TARS_HUMOUR",
                  "MISSION_START_YEAR","CURRENT_MISSION_DAY","BLIGHT_SEVERITY",
                  "WORMHOLE_STATUS","EARTH_POPULATION",
              ]
              for k in KEY_CONSTS:
                  v = ALL_CONST.get(k, "—")
                  const_rows += f"| `{k}` | `{v}` |\n"

              return textwrap.dedent(f"""\
          # INTERSTELLAR · Mission Log

          > **Live run record — updated every slot, every day.**
          > Last updated: `{NOW_UTC}`
          > This file always changes → guarantees at least 2–3 commits per day.

          ---

          ## Current Run

          | Field | Value |
          |-------|-------|
          | Timestamp (UTC) | `{NOW_UTC}` |
          | Slot | **{SLOT}** ({SLOT_LABEL}) |
          | Run # (all-time) | #{TOTAL_RUNS} |
          | Runs today | {RUNS_TODAY} |
          | Git SHA | `{SHA_SHORT}` |
          | Branch | `{BRANCH}` |
          | Trigger | {'manual' if IS_MANUAL else 'scheduled'} |
          | Force refresh | {FORCE} |
          | Bot uptime | {UPTIME_DAYS} days (since `{FIRST_RUN}`) |
          | Total commits by bot | {TOTAL_COMMITS} |

          ---

          ## Source Delta This Run

          | Category | Files |
          |----------|-------|
          | Changed | {', '.join(f'`{f}`' for f in changed) or '—'} |
          | Added   | {', '.join(f'`{f}`' for f in added)   or '—'} |
          | Deleted | {', '.join(f'`{f}`' for f in deleted) or '—'} |

          ---

          ## Codebase Metrics (live)

          | Metric | Value |
          |--------|-------|
          | .py files in root | {len(py_here)} |
          | Total lines (all .py) | {TOTAL_LINES:,} |
          | Total functions | {TOTAL_DEFS} |
          | Total classes | {TOTAL_CLASSES} |
          | Backend modules | {len(ALL_SAFE)} |
          | Navigation pages | {len(ALL_NAV)} |
          | README total lines | {readme.get('total_lines','N/A')} |
          | Git commits (all-time) | {TOTAL_COMMITS_GIT} |

          ---

          ## Mission Constants (live)

          | Constant | Value |
          |----------|-------|
          {const_rows.rstrip()}

          ---

          ## File Size Registry (all .py)

          | File | Lines | Chars | Hash (SHA-256 prefix) |
          |------|------:|------:|-----------------------|
          {py_size_rows.rstrip()}

          ---

          ## Recent Run History (last 10)

          | Timestamp | Slot | Run | SHA | Files Changed |
          |-----------|------|-----|-----|---------------|
          {hist_rows.rstrip()}

          ---

          ## Last Git Commit

          ```
          {LAST_COMMIT_DATE}
          {LAST_COMMIT_MSG}
          ```

          ---

          *INTERSTELLAR Docs Bot · slot {SLOT} · run #{TOTAL_RUNS} · {NOW_UTC}*
          """)

          # ── docs/feature-map.md
          def build_feature_map() -> str:
              nav_rows = ""
              for icon, label, key in ALL_NAV:
                  nav_rows += f"| {icon} | {label} | `{key}` |\n"

              safe_list = "\n".join(f"  - `{m}`" for m in ALL_SAFE) or "  - (none detected)"

              module_rows = ""
              for fname, desc in readme.get("modules", []):
                  module_rows += f"| `{fname}` | {desc.strip()} |\n"
              if not module_rows:
                  for name in sorted(py_here):
                      p = parsed[name]
                      doc = p.get("docstring", "")[:80].replace("\n", " ")
                      module_rows += f"| `{name}` | {doc or '—'} |\n"

              section_rows = ""
              for name in sorted(py_here):
                  for num, desc in parsed[name].get("sections", []):
                      section_rows += f"| `{name}` | §{num} | {desc.strip()} |\n"

              const_rows = ""
              KEY_CONSTS = [
                  "PLAN_A_PCT","PLAN_B_EMBRYOS","TARS_HONESTY","TARS_HUMOUR",
                  "MISSION_START_YEAR","CURRENT_MISSION_DAY","BLIGHT_SEVERITY",
                  "WORMHOLE_STATUS","EARTH_POPULATION",
              ]
              for k in KEY_CONSTS:
                  v = ALL_CONST.get(k, "—")
                  const_rows += f"| `{k}` | `{v}` |\n"

              return textwrap.dedent(f"""\
          # INTERSTELLAR · Feature Map

          > Auto-generated · Last updated: `{NOW_UTC_S}`
          > Source of truth: all `.py` files in root + `README.md`
          > **Do not edit this file manually** — changes will be overwritten.

          ---

          ## Navigation Pages

          | Icon | Label | Route Key |
          |------|-------|-----------|
          {nav_rows.rstrip() or "| — | (not yet detected) | — |"}

          ---

          ## Backend Modules (Safe-Imported)

          {safe_list}

          ---

          ## Full Module Registry

          | File | Description |
          |------|-------------|
          {module_rows.rstrip()}

          ---

          ## Mission Constants

          | Constant | Value |
          |----------|-------|
          {const_rows.rstrip()}

          ---

          ## Section Map (§ markers across all .py)

          | File | Section | Description |
          |------|---------|-------------|
          {section_rows.rstrip() or "| — | — | (none detected) |"}

          ---

          *{len(py_here)} Python files · {TOTAL_LINES:,} lines · {len(ALL_SAFE)} backends · {len(ALL_NAV)} pages*
          """)

          # ── docs/system-status.md
          def build_system_status() -> str:
              health = "✅ NOMINAL"
              if deleted:         health = "⚠️ FILES DELETED"
              if not py_here:     health = "🔴 NO .PY FILES FOUND"

              hash_rows = ""
              for f in sorted(curr_h):
                  if not curr_h[f]:
                      continue
                  tag = ""
                  if f in changed: tag = " ← **modified**"
                  if f in added:   tag = " ← **new**"
                  if f in deleted: tag = " ← ~~deleted~~"
                  hash_rows += f"| `{f}` | `{curr_h[f]}` |{tag}\n"

              py_metrics = ""
              for name in sorted(py_here):
                  p = parsed[name]
                  py_metrics += (f"| `{name}` | {p['lines']:,} | "
                                 f"{len(p.get('defs',[]))} | "
                                 f"{len(p.get('classes',[]))} | "
                                 f"{len(p.get('imports',[]))} |\n")

              return textwrap.dedent(f"""\
          # INTERSTELLAR · System Status

          > Auto-generated · `{NOW_UTC}`
          > Run #{TOTAL_RUNS} | Slot {SLOT} ({SLOT_LABEL}) | SHA `{SHA_SHORT}`

          ---

          ## Overall Health

          **Status:** {health}
          **Tracked files present:** {len(present)} / {len(ALL_TRACKED)}
          **Python files in root:** {len(py_here)}
          **Backend modules:** {len(ALL_SAFE)}
          **Navigation pages:** {len(ALL_NAV)}
          **Bot uptime:** {UPTIME_DAYS} days
          **Total bot runs:** {TOTAL_RUNS}
          **Git commits (all-time):** {TOTAL_COMMITS_GIT}

          ---

          ## Change Summary (vs previous run)

          | Category | Files |
          |----------|-------|
          | Modified | {', '.join(f'`{f}`' for f in changed) or '—'} |
          | Added    | {', '.join(f'`{f}`' for f in added)   or '—'} |
          | Deleted  | {', '.join(f'`{f}`' for f in deleted) or '—'} |

          **Repo changed this run:** {'Yes' if repo_changed else 'No'}

          ---

          ## Python File Metrics

          | File | Lines | Functions | Classes | Imports |
          |------|------:|----------:|--------:|--------:|
          {py_metrics.rstrip()}
          | **TOTAL** | **{TOTAL_LINES:,}** | **{TOTAL_DEFS}** | **{TOTAL_CLASSES}** | — |

          ---

          ## File Hash Registry

          | File | SHA-256 (16 chars) | |
          |------|--------------------|-|
          {hash_rows.rstrip()}

          ---

          ## Git Activity (last 30 days)

          ```
          {CONTRIB_AUTHORS or "N/A"}
          ```

          ---

          *Generated: {NOW_UTC}*
          """)

          # ── docs/code-intelligence.md  (deep per-file analysis)
          def build_code_intelligence() -> str:
              file_sections = ""
              for name in sorted(py_here):
                  p = parsed[name]
                  defs_list = "\n".join(f"  - `{d}()`" for d in p.get("defs", [])[:20]) or "  - (none)"
                  cls_list  = "\n".join(f"  - `{c}`"   for c in p.get("classes", []))    or "  - (none)"
                  imp_list  = "\n".join(f"  - `{i}`"   for i in p.get("imports", [])[:15]) or "  - (none)"
                  si_list   = "\n".join(f"  - `{s}`"   for s in p.get("safe_imports", [])) or "  - (none)"
                  const_rows = ""
                  for k, v in list(p.get("constants", {}).items())[:15]:
                      const_rows += f"| `{k}` | `{v}` |\n"

                  pg = p.get("page_title", "")
                  pi = p.get("page_icon",  "")
                  la = p.get("layout",     "")
                  st_info = ""
                  if pg or pi or la:
                      st_info = (f"\n**Streamlit config:** title=`{pg}` "
                                 f"icon=`{pi}` layout=`{la}`\n")

                  doc = p.get("docstring", "").replace("\n", " ")[:200]

                  file_sections += textwrap.dedent(f"""\

          ### `{name}`

          | Metric | Value |
          |--------|-------|
          | Lines | {p['lines']:,} |
          | Characters | {p['chars']:,} |
          | SHA-256 prefix | `{p['hash']}` |
          | Functions | {len(p.get('defs', []))} |
          | Classes | {len(p.get('classes', []))} |
          | Imports | {len(p.get('imports', []))} |
          | Backend modules | {len(p.get('safe_imports', []))} |
          {st_info}
          **Docstring:** {doc or '(none detected)'}

          **Top-level functions:**
          {defs_list}

          **Classes:**
          {cls_list}

          **Imports:**
          {imp_list}

          **Safe-imported backends:**
          {si_list}

          **Constants (ALL_CAPS):**

          | Name | Value |
          |------|-------|
          {const_rows.rstrip() or "| — | — |"}

          """)

              return textwrap.dedent(f"""\
          # INTERSTELLAR · Code Intelligence

          > Deep per-file analysis of every `.py` file in the repository root.
          > Auto-generated · `{NOW_UTC_S}` · {len(py_here)} files analysed

          ---

          ## Summary

          | Metric | Value |
          |--------|-------|
          | Files analysed | {len(py_here)} |
          | Total lines | {TOTAL_LINES:,} |
          | Total functions | {TOTAL_DEFS} |
          | Total classes | {TOTAL_CLASSES} |
          | Total safe-imports | {len(ALL_SAFE)} |

          ---

          ## Per-File Analysis
          {file_sections}
          ---

          *INTERSTELLAR Code Intelligence · run #{TOTAL_RUNS} · {NOW_UTC}*
          """)

          # ── docs/index.md
          def build_index() -> str:
              return textwrap.dedent(f"""\
          # INTERSTELLAR · Documentation Hub

          > Entry point for all auto-generated docs.
          > Bot running since `{FIRST_RUN}` · {UPTIME_DAYS} days uptime · {TOTAL_RUNS} total runs
          > Last updated: `{NOW_UTC_S}`

          ---

          ## Documents

          | Document | Purpose | Updated |
          |----------|---------|---------|
          | [Mission Log](mission-log.md) | Live run record — slot/SHA/metrics — **always updated** | every slot |
          | [Feature Map](feature-map.md) | Architecture snapshot — pages · modules · constants | on change |
          | [System Status](system-status.md) | Health · file hashes · git activity | on change |
          | [Code Intelligence](code-intelligence.md) | Deep per-file analysis of all `.py` | on change |
